name: Build and Push TimescaleDB CNPG Image

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  # Rebuild weekly to pick up TimescaleDB patch releases and OS security updates
  schedule:
    - cron: "0 3 * * 1"   # Mondays at 03:00 UTC
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME resolves to <owner>/<repo> (lowercase)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build pg${{ matrix.pg_major }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        pg_major:
          - "18"
        # Add more PG versions here as TimescaleDB support becomes available:
        # - "17"
        # - "16"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # pg18 — floating tag, updated on every push to main (and weekly rebuilds)
            type=raw,value=pg${{ matrix.pg_major }},enable={{is_default_branch}}
            # v1.2.3-pg18 — immutable tag on version tags
            type=ref,event=tag,suffix=-pg${{ matrix.pg_major }}
            # sha-abc1234-pg18 — commit-pinned tag for every build
            type=sha,suffix=-pg${{ matrix.pg_major }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PG_MAJOR=${{ matrix.pg_major }}
          # GitHub Actions cache — keeps subsequent builds fast
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} digest=${{ steps.build.outputs.digest }}"
